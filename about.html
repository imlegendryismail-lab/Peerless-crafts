<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Peerless Crafts</title>

<style>

body{
margin:0;
font-family: Georgia, serif;
background: linear-gradient(135deg,#3b1f08,#6e450b,#b88717);
color:white;
text-align:center;
}

/* HEADER */

header{
background:#000;
display:flex;
justify-content:space-between;
padding:15px 40px;
align-items:center;
}

.logo{
color:#d49bff;
font-size:28px;
letter-spacing:3px;
text-transform: uppercase;
}

nav a{
color:#ffd700;
margin-left:20px;
text-decoration:none;
font-size:18px;
}

/* SECTION */

.section{
padding:90px 20px;
}

/* TITLE */

.title{
font-size:60px;
font-weight:500;
background: linear-gradient(90deg,#ffcc99,#ff80bf,#a64dff);
-webkit-background-clip:text;
color:transparent;
animation: fadeUp 2s ease;
}

/* PARAGRAPH */

.text{
max-width:700px;
margin:auto;
margin-top:25px;
font-size:18px;
line-height:1.7;
color:#e5d4ff;
}

/* FEATURES */

.features{
margin-top:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:0 30px;
}

.box{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:10px;
transition:0.3s;
}

.box:hover{
transform:translateY(-8px);
background:rgba(255,255,255,0.18);
}

/* CATEGORIES */

.categories{
margin-top:40px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.cat{
padding:14px 25px;
border-radius:30px;
background:linear-gradient(90deg,#ff8ecf,#ff4fb5);
cursor:pointer;
transition:0.3s;
}

.cat:hover{
transform:scale(1.1);
}

/* BUTTON */

button{
margin-top:40px;
padding:16px 40px;
border:none;
border-radius:30px;
background:#ff5ca8;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}
